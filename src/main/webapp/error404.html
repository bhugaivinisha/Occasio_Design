<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found | OccasioDesign</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-box {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .error-box h1 { font-size: 5rem; color: #7c3aed; margin: 0; }
        .error-box h2 { color: #333; margin: 10px 0; }
        .error-box p  { color: #666; }
        .error-box a  {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: #7c3aed;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
        .error-box a:hover { background: #5b21b6; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for does not exist.</p>
        <a href="home">Go Back Home</a>
    </div>
</body>
</html>
